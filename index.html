<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
    }

    header {
      background: #e10e0e;
      color: rgb(247, 235, 235);
      padding: 1rem 2rem;
      text-align: center;
    }

    nav {
      background: #c11616;
      display: flex;
      justify-content: center;
      padding: 0.5rem;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 1rem;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      padding: 2rem;
    }

    section {
      margin-bottom: 2rem;
    }
    .dark{
    background-color: black;
    color: white;
}
    .light{
    background-color: white;
    color: black;
}

    footer {
      text-align: center;
      background: #dc1818;
      color: white;
      padding: 1rem;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

  <header>
    <h1>Welcome to My Website</h1>
  </header>

  <nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>

  <main>
    <section id="about">
      <h2>About Me</h2>
      <p>Hello! I'm learning how to build websites using HTML and CSS. This is my first example.</p>
    </section>

    <section id="projects">
      <h2>My Projects</h2>
      <ul>
        <li>Project 1: HTML Basics</li>
        <li>Project 2: CSS Styling</li>
      </ul>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <p>You can reach me at: <a href="mailto:example@email.com">example@email.com</a></p>
    </section>
  </main>
  <button id="MOD">CHANGE</button>

  <footer>
    &copy; 2025 My First Website
  </footer>
 <script src="script.js"></script>
</body>
</html>
